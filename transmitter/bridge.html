<!DOCTYPE html>
<html>
<body>
    <h2>Pico RC Bridge</h2>
    <button onclick="connectBLE()">1. Connect to Car (BLE)</button>
    <p id="status">Status: Waiting for connection...</p>
    <p id="joy">Joystick: 0, 0</p>

    <script>
        let characteristic;

        async function connectBLE() {
            try {
                const device = await navigator.bluetooth.requestDevice({
                    // Accept all devices to avoid filter mismatches
                    acceptAllDevices: true,
                    optionalServices: ['6e400001-b5a3-f393-e0a9-e50e24dcca9e']
                });

                document.getElementById('status').innerText = "Status: Pairing...";
                const server = await device.gatt.connect();
                
                // This is where it usually fails if there's a timeout
                const service = await server.getPrimaryService('6e400001-b5a3-f393-e0a9-e50e24dcca9e');
                characteristic = await service.getCharacteristic('6e400002-b5a3-f393-e0a9-e50e24dcca9e');
                
                document.getElementById('status').innerText = "Status: Connected!";
                updateLoop();
            } catch (error) {
                document.getElementById('status').innerText = "Error: " + error;
                console.error(error);
            }
        }
        let lastSent = "";

        function updateLoop() {
            const gamepads = navigator.getGamepads();
            if (gamepads[0]) {
                const x = Math.round(gamepads[0].axes[0] * 100);
                const y = Math.round(gamepads[0].axes[1] * -100);
                
                const currentData = `${x},${y}`;
                
                // Only send if the data has changed and we are connected
                if (characteristic && currentData !== lastSent) {
                    const encoder = new TextEncoder();
                    // Using WithoutResponse is CRITICAL for speed
                    characteristic.writeValueWithoutResponse(encoder.encode(currentData + "\n"));
                    lastSent = currentData;
                }
            }
            // Change from requestAnimationFrame to a fixed 40ms interval
            setTimeout(updateLoop, 40); 
        }
    </script>
</body>
</html>
